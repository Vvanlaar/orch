name: Desktop Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win-x64
          - os: macos-latest
            target: macos-arm64
          - os: ubuntu-latest
            target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - name: Install and build server + dashboard
        run: npm ci && npm run build

      - name: Install desktop deps
        working-directory: desktop
        run: bun install

      - name: Fix tar extraction on Windows
        if: runner.os == 'Windows'
        working-directory: desktop/node_modules/electrobun/.cache
        shell: bash
        run: |
          if [ -f electrobun-win-x64.tar.gz ] && [ ! -f electrobun.exe ]; then
            tar --force-local -xzf electrobun-win-x64.tar.gz
          fi

      - name: Build desktop app
        working-directory: desktop
        run: bunx electrobun build --env=stable --targets=${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: desktop/artifacts/*

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/artifacts/*
