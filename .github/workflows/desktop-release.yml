name: Desktop Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install and build server + dashboard
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: Prepare desktop package
        shell: bash
        run: |
          cp -r dist/server desktop/server
          cp -r dist/core desktop/core
          cp -r dist/dashboard desktop/dashboard

      - name: Build desktop app
        working-directory: desktop
        run: pnpm exec electron-builder --win --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-win
          path: desktop/artifacts/*.exe

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/artifacts/*.exe

  build-other:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: mac
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install and build server + dashboard
        run: pnpm install --frozen-lockfile && pnpm run build

      - name: Prepare desktop package
        shell: bash
        run: |
          cp -r dist/server desktop/server
          cp -r dist/core desktop/core
          cp -r dist/dashboard desktop/dashboard

      - name: Build desktop app
        working-directory: desktop
        run: pnpm exec electron-builder --${{ matrix.target }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            desktop/artifacts/*.dmg
            desktop/artifacts/*.AppImage

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/artifacts/*.dmg
            desktop/artifacts/*.AppImage
